<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content>
  <p>{{ data.message }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()">
    {{ data.cancelLabel ?? 'Cancelar' }}
  </button>
  <button
    mat-flat-button
    type="button"
    class="confirm-button"
    [class.is-danger]="data.isDanger"
    (click)="confirm()"
  >
    {{ data.confirmLabel }}
  </button>
</mat-dialog-actions>
