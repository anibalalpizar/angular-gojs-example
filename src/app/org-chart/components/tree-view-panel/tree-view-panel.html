<aside class="tree-panel" [class.open]="isOpen" aria-label="Panel de navegación">
  <div class="tree-header">
    <div class="tree-header-top">
      <h3 class="tree-title">Navegación</h3>
      <button class="tree-close" (click)="close()" aria-label="Cerrar panel">
        <svg lucideX size="14"></svg>
      </button>
    </div>
    <div class="tree-search-wrapper">
      <svg class="tree-search-icon" lucideSearch size="13"></svg>
      <input
        type="text"
        class="tree-search"
        placeholder="Buscar nodo..."
        [(ngModel)]="searchTerm"
        (input)="onSearchChange()"
        aria-label="Filtrar árbol de navegación"
      />
      @if (searchTerm) {
        <button class="tree-search-clear" (click)="searchTerm = ''; onSearchChange()" aria-label="Limpiar filtro">
          <svg lucideX size="13"></svg>
        </button>
      }
    </div>
  </div>

  <div class="tree-content">
    <ng-container
      [ngTemplateOutlet]="treeNodes"
      [ngTemplateOutletContext]="{ $implicit: filteredData, level: 0 }"
    ></ng-container>
  </div>

  @if (filteredData.length === 0 && searchTerm) {
    <div class="tree-empty">
      Sin resultados para "{{ searchTerm }}"
    </div>
  }
</aside>

<ng-template #treeNodes let-nodes let-level="level">
  @for (node of nodes; track node.key) {
    <div class="tree-node">
      <div class="tree-node-row" [style.padding-left.px]="8 + level * 14">
        @if (node.hasChildren || node.children.length > 0) {
          <button
            class="tree-toggle"
            (click)="toggleNode(node)"
            [attr.aria-expanded]="node.expanded"
            aria-label="Expandir/Colapsar"
          >
            <svg
              lucideChevronRight
              size="10"
              [style.transform]="node.expanded ? 'rotate(90deg)' : 'rotate(0deg)'"
              style="transition: transform 0.15s ease"
            ></svg>
          </button>
        } @else {
          <span class="tree-spacer"></span>
        }

        <button class="tree-label" (click)="navigateTo(node.key)">
          <span class="tree-avatar" [style.backgroundColor]="getNodeColor(node.level)">
            {{ getInitials(node.name) }}
          </span>
          <div class="tree-info">
            <div class="tree-name">{{ node.name }}</div>
            <div class="tree-role">{{ node.title }}</div>
          </div>
        </button>
      </div>

      @if (node.expanded && node.children.length > 0) {
        <ng-container
          [ngTemplateOutlet]="treeNodes"
          [ngTemplateOutletContext]="{ $implicit: node.children, level: level + 1 }"
        ></ng-container>
      }
    </div>
  }
</ng-template>
