@if (isOpen) {
  <div class="canvas-search-overlay">
    <div class="canvas-search-box">
      <div class="canvas-search-input-wrapper">
        <span class="canvas-search-icon">
          <svg lucideSearch size="15"></svg>
        </span>
        <input
          type="text"
          class="canvas-search-input"
          placeholder="Buscar en el diagrama..."
          [(ngModel)]="searchTerm"
          (input)="onSearch()"
          (keydown.escape)="clear()"
          (keydown.enter)="selectFirst()"
          autofocus
          aria-label="Buscar nodo en el diagrama"
        />
        @if (searchTerm) {
          <button class="canvas-search-clear" (click)="clear()" aria-label="Limpiar búsqueda">
            <svg lucideX size="14"></svg>
          </button>
        }
      </div>

      @if (resultTree.length > 0) {
        <div class="canvas-search-results">
          <ng-container
            [ngTemplateOutlet]="searchTreeTpl"
            [ngTemplateOutletContext]="{ nodes: resultTree, depth: 0 }"
          ></ng-container>
          @if (resultsTotal > maxResults) {
            <div class="canvas-search-more">
              +{{ resultsTotal - maxResults }} coincidencias más - sigue escribiendo para filtrar
            </div>
          }
        </div>
      }

      @if (searchTerm && resultTree.length === 0) {
        <div class="canvas-search-empty">
          Sin resultados para "{{ searchTerm }}"
        </div>
      }
    </div>
  </div>
}

<ng-template #searchTreeTpl let-nodes="nodes" let-depth="depth">
  <div *ngFor="let node of nodes" class="search-tree-node">
    <button
      class="search-tree-item"
      [class.is-match]="node.isMatch"
      [style.padding-left.px]="12 + depth * 16"
      (click)="navigateTo(node.key)"
    >
      <span class="search-tree-avatar" [style.backgroundColor]="getDeptColor(node.dept)">
        {{ getInitials(node.name) }}
      </span>
      <div class="search-tree-info">
        <div class="search-tree-name">{{ node.name }}</div>
        <div class="search-tree-role">{{ node.title }} · {{ node.dept }}</div>
      </div>
    </button>
    <div *ngIf="node.children.length > 0">
      <ng-container
        [ngTemplateOutlet]="searchTreeTpl"
        [ngTemplateOutletContext]="{ nodes: node.children, depth: depth + 1 }"
      ></ng-container>
    </div>
  </div>
</ng-template>
